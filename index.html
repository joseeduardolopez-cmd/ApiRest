<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario TI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Inventario de Dispositivos</h2>

    <input type="hidden" id="id">

    <input type="text" id="nombre" placeholder="Nombre">

    
    <select id="tipo">
        <option value="">Selecciona Tipo</option>
        <option value="Laptop">Laptop</option>
        <option value="PC">PC</option>
        <option value="Impresora">Impresora</option>
        <option value="Monitor">Monitor</option>  
        <option value="Monitor">Celular</option>  
        
    </select>

    
    <select id="estado">
        <option value="">Selecciona Estado</option>
        <option value="Activo">Activo</option>
        <option value="En reparación">En reparación</option>
        <option value="Baja">Baja</option>
    </select>

   
    <select id="area">
        <option value="">Selecciona Área</option>
        <option value="Sistemas">Sistemas</option>
        <option value="Administración">Administración</option>
        <option value="Recursos Humanos">Recursos Humanos</option>
        <option value="Finanzas">Finanzas</option>
        <option value="Operaciones">Operaciones</option>
    </select>


    <div class="buttons">
        <button onclick="create()">Guardar</button>
        <button onclick="update()">Actualizar</button>
    </div>

    <h3>Lista de dispositivos</h3>

    <input type="text" id="buscador" placeholder="🔍 Buscar..." onkeyup="filtrar()">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Área</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script src="/static/script.js"></script>
</body>
</html>
